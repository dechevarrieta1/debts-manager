version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: debts_db_test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: debts_test
    ports:
      - "5433:5432" # Puerto diferente para no colisionar con dev
    volumes:
      # No usamos volúmenes persistentes en test para iniciar siempre limpio
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d debts_test"]
      interval: 5s
      timeout: 5s
      retries: 5
