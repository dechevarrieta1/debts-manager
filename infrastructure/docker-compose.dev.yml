version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: debts_db_dev
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-debts_manager}
    ports:
      - "${DB_PORT_LOCAL:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/1_schema.sql:ro
      - ./seeds.sql:/docker-entrypoint-initdb.d/2_seeds.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
